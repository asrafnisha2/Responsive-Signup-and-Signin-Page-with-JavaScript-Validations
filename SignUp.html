<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Sign Up</title>

    <link rel="stylesheet"
        href="style.css">
</head>

<body>

    <div class="form-container">

        <h1>✈️ Travel App</h1>

        <h2>Sign Up</h2>

        <form id="signupForm">

            <label for="fullname">
                Full Name
            </label>

            <input
                type="text"
                id="fullname"
                placeholder="Enter full name">

            <small id="fullnameError"></small>


            <label for="email">
                Email
            </label>

            <input
                type="email"
                id="email"
                placeholder="Enter email">

            <small id="emailError"></small>


            <label for="phone">
                Phone Number
            </label>

            <input
                type="text"
                id="phone"
                placeholder="Enter phone number">

            <small id="phoneError"></small>


            <label for="city">
                Location / City
            </label>

            <input
                type="text"
                id="city"
                placeholder="Enter city">

            <small id="cityError"></small>


            <label for="password">
                Password
            </label>

            <input
                type="password"
                id="password"
                placeholder="Enter password">

            <button
                type="button"
                onclick="togglePassword('password')">
                Show Password
            </button>

            <small id="passwordError"></small>


            <label for="confirmPassword">
                Confirm Password
            </label>

            <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm password">

            <button
                type="button"
                onclick=
                "togglePassword('confirmPassword')">
                Show Password
            </button>

            <small
                id="confirmPasswordError">
            </small>

            <button type="submit">
                Sign Up
            </button>

        </form>

        <p>
            Already have an account?

            <a href="SignIn.html">
                Sign In
            </a>
        </p>

    </div>

    <script src="index.js"></script>

</body>

</html>
